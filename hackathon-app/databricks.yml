bundle:
  name: hackathon-app

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID
  genie_space_id:
    description: Default Genie Space ID
  genie_space_name:
    description: Genie Space display name
  postgres_branch:
    description: Full Lakebase Postgres branch resource name. Obtain by running `databricks postgres list-branches {project-name}`, select the desired item from the output array and use its .name value. Requires the project resource name.
  postgres_database:
    description: Full Lakebase Postgres database resource name. Obtain by running `databricks postgres list-databases {branch-name}`, select the desired item from the output array and use its .name value. Requires the branch resource name.
  postgres_project:
    description: Full Lakebase Postgres project resource name. Obtain by running `databricks postgres list-projects`, select the desired item from the output array and use its .name value.
  serving_endpoint_name:
    description: Serving endpoint name

resources:
  apps:
    app:
      name: "hackathon-app"
      description: "DAIS 2026 hackathon app with analytics, Lakebase, Genie, and AI chat"
      source_code_path: ./
      user_api_scopes:
        - dashboards.genie
        - serving.serving-endpoints

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: genie-space
          genie_space:
            name: ${var.genie_space_name}
            space_id: ${var.genie_space_id}
            permission: CAN_RUN
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE
        - name: serving-endpoint
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY

targets:
  default:
    default: true
    workspace:
      host: https://adb-7405609899023285.5.azuredatabricks.net

    variables:
      sql_warehouse_id: cd3ea746610d6fe8
      genie_space_id: 01f1685782911cfdae011d028b61022d
      genie_space_name: DAIS 2026 Virtue Foundation
      postgres_branch: projects/hackathon-app/branches/production
      postgres_database: projects/hackathon-app/branches/production/databases/databricks-postgres
      postgres_project: projects/hackathon-app
      serving_endpoint_name: databricks-claude-sonnet-4-6
